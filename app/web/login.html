<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allo4ka Admin Login</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-page">
  <main class="auth-card">
    <h1>Allo4ka Admin</h1>
    <p>Войди под учёткой администратора, чтобы управлять триггерами, ответами и прегенерацией.</p>
    <form id="login-form" class="stack-form">
      <label>Логин<input name="username" type="text" autocomplete="username" required></label>
      <label>Пароль<input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">Войти</button>
    </form>
    <p id="login-error" class="error-message"></p>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const payload = Object.fromEntries(form.entries());
      const response = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      });
      if (response.ok) {
        window.location.href = '/admin';
        return;
      }
      const data = await response.json().catch(() => ({detail: 'Ошибка входа'}));
      document.getElementById('login-error').textContent = data.detail || 'Ошибка входа';
    });
  </script>
</body>
</html>
