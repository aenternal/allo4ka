services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: allo4ka
      POSTGRES_USER: allo4ka
      POSTGRES_PASSWORD: allo4ka
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allo4ka -d allo4ka"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  init-db:
    build: .
    command: ["python", "run_admin.py", "--init-db"]
    environment:
      DATABASE_URL: postgresql+asyncpg://allo4ka:allo4ka@db:5432/allo4ka
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      VK_GROUP_TOKEN: ${VK_GROUP_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

  admin:
    build: .
    command: ["python", "run_admin.py"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://allo4ka:allo4ka@db:5432/allo4ka
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      VK_GROUP_TOKEN: ${VK_GROUP_TOKEN:-}
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "-l", "info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://allo4ka:allo4ka@db:5432/allo4ka
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      VK_GROUP_TOKEN: ${VK_GROUP_TOKEN:-}
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  bots:
    build: .
    command: ["python", "run_bots.py"]
    environment:
      DATABASE_URL: postgresql+asyncpg://allo4ka:allo4ka@db:5432/allo4ka
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      VK_GROUP_TOKEN: ${VK_GROUP_TOKEN:-}
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
